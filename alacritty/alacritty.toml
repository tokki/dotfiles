
[terminal.shell]
program = "/bin/zsh"
args = [ "-l" ]

[window]
dynamic_padding = false

  [window.dimensions]
  columns = 120
  lines = 36

  [window.padding]
  x = 0
  y = 0

[scrolling]
history = 100000
multiplier = 20

[font]
size = 14

  [font.normal]
  style = "Regular"

  [font.bold]
  style = "Bold"

  [font.italic]
  style = "Italic"

  [font.offset]
  x = 1
  y = 6

[cursor.style]
shape = "Underline"
blinking = "on"

[general]
live_config_reload = true
import = [ "~/.config/alacritty/tokyonight.toml" ]

[terminal]


